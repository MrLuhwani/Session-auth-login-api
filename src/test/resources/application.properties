# ─── Datasource: H2 in PostgreSQL-compatibility mode ──────────────────────────
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_UPPER=false;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# ─── Schema initialisation ────────────────────────────────────────────────────
# Point to the H2-safe schema so we don't clash with PostgreSQL-specific types
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-h2.sql

# ─── Caching ──────────────────────────────────────────────────────────────────
spring.cache.type=caffeine
spring.cache.cache-names=user-details
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=600s

# ─── Logging ─ keep noise low during tests ────────────────────────────────────
logging.level.root=WARN
logging.level.dev.luhwani.cookieLoginApi=DEBUG
logging.level.org.springframework.security=DEBUG